# Push-to-deploy: build the Astro site and deploy it to Cloudflare Workers.
#
# This is the robust alternative to Cloudflare's built-in Workers Builds trigger
# (which is currently NOT firing — see ops repo docs/PROGRESS.md, Phase 5).
#
# GATING (important): the deploy only runs once TWO repo secrets exist on
# NicholasJEdwards/roomtested-site:
#   - CLOUDFLARE_API_TOKEN   (scopes: Workers Scripts:Edit; plus Pages:Edit,
#                             Zone DNS:Edit, Workers Routes:Edit for cleanup/cutover)
#   - CLOUDFLARE_ACCOUNT_ID  = ea19fb59f38e072f84d12cd0940dc747
#
# GitHub does NOT allow `secrets.*` in a job-level `if:`, so we cannot skip the
# job that way. Instead the first step reads the token into an env var and writes
# an `enabled` flag to $GITHUB_OUTPUT; every subsequent step guards on it with
# `if: steps.gate.outputs.enabled == 'true'`. When the secret is absent the
# workflow runs GREEN and skips the build/deploy (a notice, not a failure).
#
# Set the secrets to enable push-to-deploy (Settings → Secrets and variables →
# Actions), or via gh CLI:
#   gh secret set CLOUDFLARE_API_TOKEN  --repo NicholasJEdwards/roomtested-site --body "<token>"
#   gh secret set CLOUDFLARE_ACCOUNT_ID --repo NicholasJEdwards/roomtested-site --body "ea19fb59f38e072f84d12cd0940dc747"

name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Standalone gate — needs no repo checkout. Reads the secret into an env
      # var and emits enabled=true|false so later steps can guard on it.
      - name: Gate on Cloudflare token
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No CLOUDFLARE_API_TOKEN secret set — skipping deploy. Set it (repo Settings → Secrets → Actions) to enable push-to-deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up pnpm
        if: steps.gate.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      # Runs scripts/generate-cards.mjs (satori cards in plain Node) then astro build.
      - name: Build
        if: steps.gate.outputs.enabled == 'true'
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        if: steps.gate.outputs.enabled == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
